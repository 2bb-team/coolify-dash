services:
  coolify-monitor:
    build: .
    container_name: coolify-monitor
    ports:
      - "9100:9100"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
    environment:
      - COOLIFY_API_URL=http://host.docker.internal:8000
      - COOLIFY_API_TOKEN=${COOLIFY_API_TOKEN}
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9100/api/health', timeout=5).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
